<!DOCTYPE html>
<html>
<head>
    <title>Respond to Mentorship Request</title>
</head>
<body>
    <h1>Respond to Mentorship Request</h1>
    <p><strong>From:</strong> {{ mentorship_request.mentee.full_name }}</p>
    <p><strong>Message:</strong> {{ mentorship_request.message }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>
</body>
</html>
